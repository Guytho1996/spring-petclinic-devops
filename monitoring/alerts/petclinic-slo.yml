groups:
  - name: petclinic-slo
    rules:
      - alert: PetclinicHttp5xxErrorRateHigh
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_seconds_count[5m])), 0.001)
          ) > 0.01
        for: 5m
        labels:
          severity: warning
          slo: availability
          service: petclinic-backend
        annotations:
          summary: "Petclinic HTTP 5xx error rate is above 1%"
          description: "HTTP 5xx responses have exceeded 1% of requests for 5 minutes."

      - alert: PetclinicErrorBudgetBurnFast
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_seconds_count[5m])), 0.001)
          ) / 0.001 > 10
        for: 5m
        labels:
          severity: critical
          slo: availability
          service: petclinic-backend
        annotations:
          summary: "Petclinic is burning error budget too quickly"
          description: "The 5-minute error budget burn rate is above 10x for the 99.9% availability SLO."

      - alert: PetclinicLatencyP99High
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(http_server_requests_seconds_bucket[5m])) by (le)
          ) > 1
        for: 10m
        labels:
          severity: warning
          slo: latency
          service: petclinic-backend
        annotations:
          summary: "Petclinic P99 latency is above 1s"
          description: "P99 HTTP request latency has stayed above 1 second for 10 minutes."
