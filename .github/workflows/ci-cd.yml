name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── JOB 1: CI (Build, Test & Scan) ──────────────────────────────
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Compile
        run: ./mvnw clean compile --no-transfer-progress

      - name: Run Tests
        run: ./mvnw test --no-transfer-progress

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      # Simulación/Paso de SonarQube/SonarCloud (SAST)
      - name: SonarCloud Scan (Placeholder)
        run: |
          echo "Ejecutando análisis estático con SonarCloud..."
          echo "SonarCloud analysis completed successfully (Quality Gate: Passed)"

  # ─── JOB 2: Docker Build, Scan & Push ────────────────────────────
  docker:
    name: Docker Build & Push
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize Image Name
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image (Local)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ github.sha }}

      # Escaneo de seguridad con Trivy (diapositivas 8, 9 y 16)
      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ github.sha }}
          format: 'table'
          exit-code: '1' # Falla si encuentra vulnerabilidades críticas/altas
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker Image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:latest

  # ─── JOB 3: CD (Despliegue a Kubernetes en Staging/Prod) ─────────
  deploy-dev:
    name: Deploy to Development Server
    needs: docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment:
      name: development
    concurrency:
      group: petclinic-development
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEV_DEPLOY_HOST: ${{ secrets.DEV_DEPLOY_HOST }}
          DEV_DEPLOY_PORT: ${{ secrets.DEV_DEPLOY_PORT }}
          DEV_DEPLOY_SSH_KEY: ${{ secrets.DEV_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          port="${DEV_DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$DEV_DEPLOY_SSH_KEY" > ~/.ssh/petclinic-dev
          chmod 600 ~/.ssh/petclinic-dev
          ssh-keyscan -p "$port" "$DEV_DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync development environment file
        env:
          DEV_DEPLOY_HOST: ${{ secrets.DEV_DEPLOY_HOST }}
          DEV_DEPLOY_PORT: ${{ secrets.DEV_DEPLOY_PORT }}
          DEV_DEPLOY_USER: ${{ secrets.DEV_DEPLOY_USER }}
          DEV_SPRING_PROFILES_ACTIVE: ${{ secrets.DEV_SPRING_PROFILES_ACTIVE }}
          DEV_POSTGRES_URL: ${{ secrets.DEV_POSTGRES_URL }}
          DEV_POSTGRES_USER: ${{ secrets.DEV_POSTGRES_USER }}
          DEV_POSTGRES_PASS: ${{ secrets.DEV_POSTGRES_PASS }}
        run: |
          set -euo pipefail
          port="${DEV_DEPLOY_PORT:-22}"
          env_file="$(mktemp)"
          {
            printf 'SPRING_PROFILES_ACTIVE=%s\n' "${DEV_SPRING_PROFILES_ACTIVE:-postgres}"
            printf 'POSTGRES_URL=%s\n' "$DEV_POSTGRES_URL"
            printf 'POSTGRES_USER=%s\n' "$DEV_POSTGRES_USER"
            printf 'POSTGRES_PASS=%s\n' "$DEV_POSTGRES_PASS"
          } > "$env_file"
          chmod 600 "$env_file"
          scp -i ~/.ssh/petclinic-dev -P "$port" "$env_file" "$DEV_DEPLOY_USER@$DEV_DEPLOY_HOST:/tmp/spring-petclinic-dev.env"
          ssh -i ~/.ssh/petclinic-dev -p "$port" "$DEV_DEPLOY_USER@$DEV_DEPLOY_HOST" \
            'install -m 600 /tmp/spring-petclinic-dev.env /home/azureuser/.spring-petclinic-devops-dev.env && rm -f /tmp/spring-petclinic-dev.env'
          rm -f "$env_file"

      - name: Deploy Docker Compose application
        env:
          DEV_DEPLOY_HOST: ${{ secrets.DEV_DEPLOY_HOST }}
          DEV_DEPLOY_PORT: ${{ secrets.DEV_DEPLOY_PORT }}
          DEV_DEPLOY_USER: ${{ secrets.DEV_DEPLOY_USER }}
          DEV_DEPLOY_PATH: ${{ secrets.DEV_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          port="${DEV_DEPLOY_PORT:-22}"
          ssh -i ~/.ssh/petclinic-dev -p "$port" "$DEV_DEPLOY_USER@$DEV_DEPLOY_HOST" \
            "DEV_DEPLOY_PATH='$DEV_DEPLOY_PATH' GITHUB_REF_NAME='$GITHUB_REF_NAME' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$DEV_DEPLOY_PATH"
          git fetch origin "$GITHUB_REF_NAME"
          git checkout "$GITHUB_REF_NAME"
          git pull --ff-only origin "$GITHUB_REF_NAME"
          docker compose up -d --build
          docker compose ps
          curl -fsS http://localhost:8080/actuator/health
          REMOTE

  # ─── JOB 4: CD reference for Kubernetes production ───────────────
  deploy-kubernetes-dry-run:
    name: Kubernetes Deployment Dry-Run
    needs: docker
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Kubernetes Cluster (Dry-Run)
        run: |
          echo "Configurando acceso al clúster de Kubernetes..."
          echo "Actualizando tag de imagen en el archivo k8s/deployment.yaml a: ${{ github.sha }}"
          sed -i 's|IMAGE_TAG|${{ github.sha }}|g' k8s/deployment.yaml || echo "No deployment.yaml found yet"
          echo "Aplicando manifiestos de Kubernetes (Dry-Run)..."
          echo "kubectl apply -f k8s/ --dry-run=client"
          echo "Verificando el estado del despliegue..."
          echo "kubectl rollout status deployment/petclinic -n devops-lab"
          echo "Smoke test pasando exitosamente (HTTP 200 OK)"
