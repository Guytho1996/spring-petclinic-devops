name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      deploy_production:
        description: 'Run development deployment and then request production approval'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── JOB 1: CI (Build & Test) ────────────────────────────────────
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Compile
        run: ./mvnw clean compile --no-transfer-progress

      - name: Run Tests
        run: ./mvnw test --no-transfer-progress

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  # ─── JOB 2: Security Gates (SAST & SCA) ──────────────────────────
  security:
    name: SAST & SCA Security Gates
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Prime Maven Dependency Cache
        run: ./mvnw -B dependency:go-offline --no-transfer-progress

      - name: Run Semgrep SAST
        run: |
          docker run --rm \
            -v "${PWD}:/src:ro" \
            -w /src \
            semgrep/semgrep:1.165.0 \
            semgrep scan \
              --config p/java \
              --config p/security-audit \
              --error \
              --metrics=off \
              --exclude target

      - name: Run Trivy SCA Dependency Scan
        run: |
          docker run --rm \
            -v "${PWD}:/src:ro" \
            -v "${HOME}/.m2:/root/.m2:ro" \
            -w /src \
            aquasec/trivy:latest \
            fs \
              --scanners vuln \
              --pkg-types library \
              --severity CRITICAL,HIGH \
              --ignore-unfixed \
              --offline-scan \
              --exit-code 1 \
              .

  # ─── JOB 3: Docker Build, Scan & Push ────────────────────────────
  docker:
    name: Docker Build & Push
    needs: security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize Image Name
        run: |
          image_name_lc="${GITHUB_REPOSITORY,,}"
          echo "IMAGE_NAME_LC=$image_name_lc" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=${REGISTRY}/$image_name_lc" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=${REGISTRY}/${image_name_lc}-frontend" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Backend Docker Image (Local)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}-backend:${{ github.sha }}

      - name: Build Frontend Docker Image (Local)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          load: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      # Escaneo de seguridad con Trivy (diapositivas 8, 9 y 16)
      - name: Run Backend Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: 'table'
          exit-code: '1' # Falla si encuentra vulnerabilidades críticas/altas
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Run Frontend Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          scanners: 'vuln'
          severity: 'CRITICAL,HIGH'

      - name: Push Backend Docker Image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}-backend:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}-backend:latest

      - name: Push Frontend Docker Image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

  # ─── JOB 4: CD automático a desarrollo ───────────────────────────
  deploy-dev:
    name: Deploy to Development Server
    needs: docker
    if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_production == true)) && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment:
      name: development
    concurrency:
      group: petclinic-development
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEV_DEPLOY_HOST: ${{ secrets.DEV_DEPLOY_HOST }}
          DEV_DEPLOY_PORT: ${{ secrets.DEV_DEPLOY_PORT }}
          DEV_DEPLOY_SSH_KEY: ${{ secrets.DEV_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          port="${DEV_DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$DEV_DEPLOY_SSH_KEY" > ~/.ssh/petclinic-dev
          chmod 600 ~/.ssh/petclinic-dev
          ssh-keyscan -p "$port" "$DEV_DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync development environment file
        env:
          DEV_DEPLOY_HOST: ${{ secrets.DEV_DEPLOY_HOST }}
          DEV_DEPLOY_PORT: ${{ secrets.DEV_DEPLOY_PORT }}
          DEV_DEPLOY_USER: ${{ secrets.DEV_DEPLOY_USER }}
          DEV_SPRING_PROFILES_ACTIVE: ${{ secrets.DEV_SPRING_PROFILES_ACTIVE }}
          DEV_POSTGRES_URL: ${{ secrets.DEV_POSTGRES_URL }}
          DEV_POSTGRES_USER: ${{ secrets.DEV_POSTGRES_USER }}
          DEV_POSTGRES_PASS: ${{ secrets.DEV_POSTGRES_PASS }}
          DEV_APP_CORS_ALLOWED_ORIGINS: ${{ secrets.DEV_APP_CORS_ALLOWED_ORIGINS || 'https://guytho1996-petclinic-dev.eastus2.cloudapp.azure.com' }}
        run: |
          set -euo pipefail
          port="${DEV_DEPLOY_PORT:-22}"
          env_file="$(mktemp)"
          {
            printf 'SPRING_PROFILES_ACTIVE=%s\n' "${DEV_SPRING_PROFILES_ACTIVE:-postgres}"
            printf 'POSTGRES_URL=%s\n' "$DEV_POSTGRES_URL"
            printf 'POSTGRES_USER=%s\n' "$DEV_POSTGRES_USER"
            printf 'POSTGRES_PASS=%s\n' "$DEV_POSTGRES_PASS"
            printf 'APP_CORS_ALLOWED_ORIGINS=%s\n' "$DEV_APP_CORS_ALLOWED_ORIGINS"
          } > "$env_file"
          chmod 600 "$env_file"
          scp -i ~/.ssh/petclinic-dev -P "$port" "$env_file" "$DEV_DEPLOY_USER@$DEV_DEPLOY_HOST:/tmp/spring-petclinic-dev.env"
          ssh -i ~/.ssh/petclinic-dev -p "$port" "$DEV_DEPLOY_USER@$DEV_DEPLOY_HOST" \
            'install -m 600 /tmp/spring-petclinic-dev.env /home/azureuser/.spring-petclinic-devops-dev.env && rm -f /tmp/spring-petclinic-dev.env'
          rm -f "$env_file"

      - name: Deploy Docker Compose application
        env:
          DEV_DEPLOY_HOST: ${{ secrets.DEV_DEPLOY_HOST }}
          DEV_DEPLOY_PORT: ${{ secrets.DEV_DEPLOY_PORT }}
          DEV_DEPLOY_USER: ${{ secrets.DEV_DEPLOY_USER }}
          DEV_DEPLOY_PATH: ${{ secrets.DEV_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          port="${DEV_DEPLOY_PORT:-22}"
          ssh -i ~/.ssh/petclinic-dev -p "$port" "$DEV_DEPLOY_USER@$DEV_DEPLOY_HOST" \
            "DEV_DEPLOY_PATH='$DEV_DEPLOY_PATH' GITHUB_REF_NAME='$GITHUB_REF_NAME' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$DEV_DEPLOY_PATH"
          git fetch origin "$GITHUB_REF_NAME"
          git checkout "$GITHUB_REF_NAME"
          git pull --ff-only origin "$GITHUB_REF_NAME"
          docker compose up -d --build
          docker compose ps
          for attempt in $(seq 1 24); do
            if curl -kfsS https://localhost/actuator/health; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs --tail=100 app frontend
          exit 1
          REMOTE

  # ─── JOB 5: CD a producción con aprobación manual ────────────────
  deploy-prod:
    name: Deploy to Production Server
    needs: deploy-dev
    if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_production == true)) && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment:
      name: production
    concurrency:
      group: petclinic-production
      cancel-in-progress: false
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install SSH tunnel dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass
          curl -fsSL -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Verify production SSH path
        env:
          PROD_DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
          PROD_DEPLOY_USER: ${{ secrets.PROD_DEPLOY_USER }}
          PROD_DEPLOY_PASSWORD: ${{ secrets.PROD_DEPLOY_PASSWORD }}
          PROD_DEPLOY_TARGET: ${{ secrets.PROD_DEPLOY_TARGET }}
        run: |
          set -euo pipefail
          SSHPASS="$PROD_DEPLOY_PASSWORD" sshpass -e ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ProxyCommand='cloudflared access ssh --hostname %h' \
            "$PROD_DEPLOY_USER@$PROD_DEPLOY_HOST" \
            "ssh -o BatchMode=yes -o StrictHostKeyChecking=no '$PROD_DEPLOY_TARGET' 'hostname && whoami'"

      - name: Sync production environment file
        env:
          PROD_DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
          PROD_DEPLOY_USER: ${{ secrets.PROD_DEPLOY_USER }}
          PROD_DEPLOY_PASSWORD: ${{ secrets.PROD_DEPLOY_PASSWORD }}
          PROD_DEPLOY_TARGET: ${{ secrets.PROD_DEPLOY_TARGET }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
          PROD_SPRING_PROFILES_ACTIVE: ${{ secrets.PROD_SPRING_PROFILES_ACTIVE }}
          PROD_POSTGRES_URL: ${{ secrets.PROD_POSTGRES_URL }}
          PROD_POSTGRES_USER: ${{ secrets.PROD_POSTGRES_USER }}
          PROD_POSTGRES_PASS: ${{ secrets.PROD_POSTGRES_PASS }}
          PROD_APP_CORS_ALLOWED_ORIGINS: ${{ secrets.PROD_APP_CORS_ALLOWED_ORIGINS || 'https://guytho1996-petclinic.eastus2.cloudapp.azure.com' }}
        run: |
          set -euo pipefail
          env_file="$(mktemp)"
          trap 'rm -f "$env_file"' EXIT
          {
            printf 'SPRING_PROFILES_ACTIVE=%s\n' "${PROD_SPRING_PROFILES_ACTIVE:-postgres}"
            printf 'POSTGRES_URL=%s\n' "$PROD_POSTGRES_URL"
            printf 'POSTGRES_USER=%s\n' "$PROD_POSTGRES_USER"
            printf 'POSTGRES_PASS=%s\n' "$PROD_POSTGRES_PASS"
            printf 'APP_CORS_ALLOWED_ORIGINS=%s\n' "$PROD_APP_CORS_ALLOWED_ORIGINS"
          } > "$env_file"
          chmod 600 "$env_file"

          remote_env_file="/home/azureuser/.spring-petclinic-devops-prod.env"
          remote_project_env="${PROD_DEPLOY_PATH%/}/.env"
          ssh_base=(
            sshpass -e ssh
            -o StrictHostKeyChecking=no
            -o UserKnownHostsFile=/dev/null
            -o ProxyCommand='cloudflared access ssh --hostname %h'
            "$PROD_DEPLOY_USER@$PROD_DEPLOY_HOST"
          )

          base64 -w0 "$env_file" | SSHPASS="$PROD_DEPLOY_PASSWORD" "${ssh_base[@]}" \
            "ssh -o BatchMode=yes -o StrictHostKeyChecking=no '$PROD_DEPLOY_TARGET' 'umask 077; base64 -d > $remote_env_file; chmod 600 $remote_env_file'"

          SSHPASS="$PROD_DEPLOY_PASSWORD" "${ssh_base[@]}" \
            "ssh -o BatchMode=yes -o StrictHostKeyChecking=no '$PROD_DEPLOY_TARGET' 'umask 077; printf \"%s\\n\" PETCLINIC_ENV_FILE=$remote_env_file > $remote_project_env; chmod 600 $remote_project_env'"

      - name: Deploy Docker Compose application to production
        env:
          PROD_DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
          PROD_DEPLOY_USER: ${{ secrets.PROD_DEPLOY_USER }}
          PROD_DEPLOY_PASSWORD: ${{ secrets.PROD_DEPLOY_PASSWORD }}
          PROD_DEPLOY_TARGET: ${{ secrets.PROD_DEPLOY_TARGET }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          SSHPASS="$PROD_DEPLOY_PASSWORD" sshpass -e ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ProxyCommand='cloudflared access ssh --hostname %h' \
            "$PROD_DEPLOY_USER@$PROD_DEPLOY_HOST" \
            "ssh -o BatchMode=yes -o StrictHostKeyChecking=no '$PROD_DEPLOY_TARGET' \"PROD_DEPLOY_PATH='$PROD_DEPLOY_PATH' GITHUB_REF_NAME='$GITHUB_REF_NAME' bash -se\"" <<'REMOTE'
          set -euo pipefail
          cd "$PROD_DEPLOY_PATH"
          git fetch origin "$GITHUB_REF_NAME"
          git checkout "$GITHUB_REF_NAME"
          git pull --ff-only origin "$GITHUB_REF_NAME"
          docker_cmd="docker"
          if ! docker info >/dev/null 2>&1; then
            docker_cmd="sudo docker"
          fi
          $docker_cmd compose up -d --build
          $docker_cmd compose ps
          for attempt in $(seq 1 24); do
            if curl -kfsS https://localhost/actuator/health; then
              exit 0
            fi
            sleep 5
          done
          $docker_cmd compose logs --tail=100 app frontend
          exit 1
          REMOTE
