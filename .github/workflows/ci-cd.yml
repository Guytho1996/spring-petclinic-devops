name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      deploy_production:
        description: 'Run development deployment and then request production approval'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── JOB 1: CI (Build & Test) ────────────────────────────────────
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Compile
        run: ./mvnw clean compile --no-transfer-progress

      - name: Run Tests
        run: ./mvnw test --no-transfer-progress

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  # ─── JOB 2: Security Gates (SAST & SCA) ──────────────────────────
  security:
    name: SAST & SCA Security Gates
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Prime Maven Dependency Cache
        run: ./mvnw -B dependency:go-offline --no-transfer-progress

      - name: Run Semgrep SAST
        run: |
          docker run --rm \
            -v "${PWD}:/src:ro" \
            -w /src \
            semgrep/semgrep:1.165.0 \
            semgrep scan \
              --config p/java \
              --config p/security-audit \
              --error \
              --metrics=off \
              --exclude target

      - name: Run Trivy SCA Dependency Scan
        run: |
          docker run --rm \
            -v "${PWD}:/src:ro" \
            -v "${HOME}/.m2:/root/.m2:ro" \
            -w /src \
            aquasec/trivy:latest \
            fs \
              --scanners vuln \
              --pkg-types library \
              --severity CRITICAL,HIGH \
              --ignore-unfixed \
              --offline-scan \
              --exit-code 1 \
              .

  # ─── JOB 3: Docker Build, Scan & Push ────────────────────────────
  docker:
    name: Docker Build & Push
    needs: security
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.images.outputs.backend_image }}
      frontend_image: ${{ steps.images.outputs.frontend_image }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize Image Name
        id: images
        run: |
          image_name_lc="${GITHUB_REPOSITORY,,}"
          echo "IMAGE_NAME_LC=$image_name_lc" >> "$GITHUB_ENV"
          backend_image="${REGISTRY}/$image_name_lc"
          frontend_image="${REGISTRY}/${image_name_lc}-frontend"
          echo "BACKEND_IMAGE=$backend_image" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=$frontend_image" >> "$GITHUB_ENV"
          echo "backend_image=$backend_image" >> "$GITHUB_OUTPUT"
          echo "frontend_image=$frontend_image" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Backend Docker Image (Local)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}-backend:${{ github.sha }}

      - name: Build Frontend Docker Image (Local)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          load: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      # Escaneo de seguridad con Trivy (diapositivas 8, 9 y 16)
      - name: Run Backend Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: 'table'
          exit-code: '1' # Falla si encuentra vulnerabilidades críticas/altas
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Run Frontend Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          scanners: 'vuln'
          severity: 'CRITICAL,HIGH'

      - name: Push Backend Docker Image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}-backend:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}-backend:latest

      - name: Push Frontend Docker Image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

  # ─── JOB 4: CD automático a desarrollo/staging ───────────────────
  deploy-dev:
    name: Deploy to Development AKS
    needs: docker
    if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_production == true)) && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment:
      name: development
    concurrency:
      group: petclinic-development
      cancel-in-progress: true
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure AKS context
        env:
          AKS_RESOURCE_GROUP: ${{ vars.DEV_AKS_RESOURCE_GROUP || 'petclinic-staging-rg' }}
          AKS_CLUSTER_NAME: ${{ vars.DEV_AKS_CLUSTER_NAME || 'petclinic-staging-aks' }}
        run: |
          set -euo pipefail
          az aks get-credentials \
            --resource-group "$AKS_RESOURCE_GROUP" \
            --name "$AKS_CLUSTER_NAME" \
            --overwrite-existing
          kubectl config current-context

      - name: Deploy Kubernetes rolling update
        env:
          IMAGE_TAG: ${{ github.sha }}
          BACKEND_IMAGE: ${{ needs.docker.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.docker.outputs.frontend_image }}
          K8S_NAMESPACE: ${{ vars.DEV_K8S_NAMESPACE || 'devops-lab' }}
          INGRESS_HOST: ${{ vars.DEV_INGRESS_HOST || 'guytho1996-petclinic-dev.eastus2.cloudapp.azure.com' }}
          SPRING_PROFILES_ACTIVE: ${{ secrets.DEV_SPRING_PROFILES_ACTIVE || 'postgres' }}
          POSTGRES_URL: ${{ secrets.DEV_POSTGRES_URL }}
          POSTGRES_USER: ${{ secrets.DEV_POSTGRES_USER }}
          POSTGRES_PASS: ${{ secrets.DEV_POSTGRES_PASS }}
          APP_CORS_ALLOWED_ORIGINS: ${{ secrets.DEV_APP_CORS_ALLOWED_ORIGINS || 'https://guytho1996-petclinic-dev.eastus2.cloudapp.azure.com' }}
          FRONTEND_APP_ENV: development
          FRONTEND_BACKEND_BASE_URL: same-origin
          SMOKE_TEST_URL: ${{ secrets.DEV_SMOKE_TEST_URL }}
        run: ./scripts/deploy-k8s-rolling-update.sh

      - name: Deploy to Local K3s and Docker Compose on VM via SSH
        env:
          DEV_DEPLOY_HOST: ${{ secrets.DEV_DEPLOY_HOST }}
          DEV_DEPLOY_PORT: ${{ secrets.DEV_DEPLOY_PORT }}
          DEV_DEPLOY_SSH_KEY: ${{ secrets.DEV_DEPLOY_SSH_KEY }}
          DEV_DEPLOY_USER: ${{ secrets.DEV_DEPLOY_USER }}
          DEV_DEPLOY_PATH: ${{ secrets.DEV_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          port="${DEV_DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$DEV_DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$port" "$DEV_DEPLOY_HOST" >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/id_rsa -p "$port" "$DEV_DEPLOY_USER@$DEV_DEPLOY_HOST" \
            "DEV_DEPLOY_PATH='$DEV_DEPLOY_PATH' GITHUB_REF_NAME='$GITHUB_REF_NAME' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$DEV_DEPLOY_PATH"
          git fetch origin "$GITHUB_REF_NAME"
          git checkout "$GITHUB_REF_NAME"
          git pull --ff-only origin "$GITHUB_REF_NAME"
          # Rebuild and update Docker Compose
          docker compose build frontend
          docker compose up -d frontend
          # Import image to local K3s containerd
          docker save spring-petclinic-devops-frontend:latest | sudo k3s ctr -n k8s.io images import -
          # Rollout restart petclinic-frontend in local K3s
          sudo KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl rollout restart deployment/petclinic-frontend -n devops-lab
          sudo KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl rollout status deployment/petclinic-frontend -n devops-lab
          REMOTE

  # ─── JOB 5: DAST con OWASP ZAP sobre development ─────────────────
  zap-baseline:
    name: OWASP ZAP Baseline Scan
    needs: deploy-dev
    if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_production == true)) && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ZAP_TARGET_URL: ${{ vars.DEV_ZAP_TARGET_URL || 'https://guytho1996-petclinic-dev.eastus2.cloudapp.azure.com' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ env.ZAP_TARGET_URL }}
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-m 2 -T 10 -I'
          allow_issue_writing: 'false'
          fail_action: 'false'
          artifact_name: 'zap-baseline-security-report'

  # ─── JOB 6: CD a producción con aprobación manual ────────────────
  deploy-prod:
    name: Deploy to Production AKS
    needs: [docker, deploy-dev, zap-baseline]
    if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_production == true)) && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment:
      name: production
    concurrency:
      group: petclinic-production
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure AKS context
        env:
          AKS_RESOURCE_GROUP: ${{ vars.PROD_AKS_RESOURCE_GROUP || 'petclinic-production-rg' }}
          AKS_CLUSTER_NAME: ${{ vars.PROD_AKS_CLUSTER_NAME || 'petclinic-production-aks' }}
        run: |
          set -euo pipefail
          az aks get-credentials \
            --resource-group "$AKS_RESOURCE_GROUP" \
            --name "$AKS_CLUSTER_NAME" \
            --overwrite-existing
          kubectl config current-context

      - name: Deploy Kubernetes rolling update
        env:
          IMAGE_TAG: ${{ github.sha }}
          BACKEND_IMAGE: ${{ needs.docker.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.docker.outputs.frontend_image }}
          K8S_NAMESPACE: ${{ vars.PROD_K8S_NAMESPACE || 'devops-lab' }}
          INGRESS_HOST: ${{ vars.PROD_INGRESS_HOST || 'guytho1996-petclinic.eastus2.cloudapp.azure.com' }}
          SPRING_PROFILES_ACTIVE: ${{ secrets.PROD_SPRING_PROFILES_ACTIVE || 'postgres' }}
          POSTGRES_URL: ${{ secrets.PROD_POSTGRES_URL }}
          POSTGRES_USER: ${{ secrets.PROD_POSTGRES_USER }}
          POSTGRES_PASS: ${{ secrets.PROD_POSTGRES_PASS }}
          APP_CORS_ALLOWED_ORIGINS: ${{ secrets.PROD_APP_CORS_ALLOWED_ORIGINS || 'https://guytho1996-petclinic.eastus2.cloudapp.azure.com' }}
          FRONTEND_APP_ENV: production
          FRONTEND_BACKEND_BASE_URL: same-origin
          SMOKE_TEST_URL: ${{ secrets.PROD_SMOKE_TEST_URL }}
        run: ./scripts/deploy-k8s-rolling-update.sh
