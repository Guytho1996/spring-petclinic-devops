<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Petclinic - Consulta de Propietarios</title>
    <link rel="icon" href="../assets/favicon.png">
    <link rel="stylesheet" href="../assets/site.css">
    <style>
      .search-form {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 24px;
        box-shadow: var(--shadow);
        margin-bottom: 24px;
        display: flex;
        gap: 16px;
        align-items: flex-end;
        flex-wrap: wrap;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1 1 250px;
      }
      .form-label {
        font-size: 0.82rem;
        font-weight: 800;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .form-input {
        min-height: 40px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-family: inherit;
        font-size: 0.95rem;
        background: var(--surface);
        color: var(--ink);
      }
      .form-input:focus {
        outline: none;
        border-color: var(--brand);
      }
      .btn-container {
        display: flex;
        gap: 12px;
      }
      .table-container {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        overflow-x: auto;
        margin-top: 24px;
      }
      .owners-table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
        font-size: 0.95rem;
      }
      .owners-table th, .owners-table td {
        padding: 16px 20px;
        border-bottom: 1px solid var(--line);
      }
      .owners-table th {
        background: var(--surface-soft);
        color: var(--muted);
        font-weight: 800;
        text-transform: uppercase;
        font-size: 0.78rem;
        letter-spacing: 0.05em;
      }
      .owners-table tr:last-child td {
        border-bottom: none;
      }
      .owners-table tr:hover td {
        background: var(--surface-soft);
      }
      .owner-link {
        color: var(--brand);
        font-weight: 700;
        text-decoration: none;
      }
      .owner-link:hover {
        text-decoration: underline;
        color: var(--brand-dark);
      }
      .pet-badge {
        display: inline-block;
        background: var(--surface-soft);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 4px 8px;
        margin-right: 6px;
        margin-bottom: 4px;
        font-size: 0.82rem;
        font-weight: 600;
      }
      .status-box {
        border-radius: 8px;
        padding: 16px 20px;
        margin-top: 24px;
        font-size: 0.95rem;
        font-weight: 500;
        line-height: 1.5;
        display: none;
      }
    </style>
  </head>
  <body>
    <header class="topbar" aria-label="Petclinic">
      <a class="brand" href="../">
        <img src="../assets/pets.png" alt="" width="76" height="56">
        <span>
          <strong>Spring Petclinic</strong>
          <small>Frontend estático</small>
        </span>
      </a>
      <nav aria-label="Acciones principales">
        <a class="nav-link" href="../">Volver al Inicio</a>
      </nav>
    </header>

    <main>
      <section style="padding: 20px 0 10px 0;">
        <p class="eyebrow" id="query-eyebrow">Consulta de Propietarios</p>
        <h1 id="query-headline" style="font-size: clamp(2rem, 5vw, 3.5rem);">Buscar Propietarios</h1>
        <p style="color: var(--muted); margin-top: 8px;">Busque y gestione la información de los propietarios de mascotas y sus visitas.</p>
      </section>

      <form class="search-form" id="search-owner-form" method="get" action="./index.html">
        <div class="form-group">
          <label for="lastName-input" class="form-label">Apellido</label>
          <input type="text" id="lastName-input" name="lastName" class="form-input" placeholder="Ej: Franklin, Davis...">
        </div>
        <div class="btn-container">
          <button type="submit" class="command primary">Buscar Propietario</button>
          <a class="command" href="/owners/new">Añadir Propietario</a>
        </div>
      </form>

      <div id="status-message" class="status-box"></div>

      <div id="owners-list-container" class="table-container" style="display: none;">
        <table class="owners-table">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Dirección</th>
              <th>Ciudad</th>
              <th>Teléfono</th>
              <th>Mascotas</th>
            </tr>
          </thead>
          <tbody id="owners-table-body">
            <!-- Dynamic content -->
          </tbody>
        </table>
      </div>
    </main>

    <script src="../config.js"></script>
    <script>
      (function () {
        "use strict";

        const config = window.PETCLINIC_CONFIG || {};
        const backendBaseUrl = normalizeBackendUrl(config.backendBaseUrl);
        
        // Obtener el parámetro lastName de la URL actual
        const params = new URLSearchParams(window.location.search);
        const lastName = params.has('lastName') ? params.get('lastName') : '';

        // Rellenar el input con el parámetro actual
        const inputEl = document.getElementById('lastName-input');
        if (inputEl) {
          inputEl.value = lastName;
        }

        const containerEl = document.getElementById('owners-list-container');
        const tableBodyEl = document.getElementById('owners-table-body');
        const statusEl = document.getElementById('status-message');

        function setStatus(text, type = 'info') {
          statusEl.textContent = text;
          statusEl.style.display = 'block';
          if (type === 'error') {
            statusEl.style.background = '#fee2e2';
            statusEl.style.border = '1px solid #fecaca';
            statusEl.style.color = '#b91c1c';
          } else if (type === 'loading') {
            statusEl.style.background = '#fef3c7';
            statusEl.style.border = '1px solid #fde68a';
            statusEl.style.color = '#b45309';
          } else {
            statusEl.style.background = '#f4f8f6';
            statusEl.style.border = '1px solid #d8e2dc';
            statusEl.style.color = '#5c6f65';
          }
        }

        function normalizeBackendUrl(value) {
          if (!value || typeof value !== 'string') {
            return '';
          }
          const trimmed = value.trim();
          if (!trimmed) {
            return '';
          }
          if (trimmed === 'same-origin') {
            return window.location.origin;
          }
          try {
            const parsed = new URL(trimmed);
            if (parsed.protocol !== 'https:' && parsed.protocol !== 'http:') {
              return '';
            }
            return parsed.href.replace(/\/+$/, '');
          }
          catch (error) {
            return '';
          }
        }

        if (!backendBaseUrl) {
          setStatus('Backend no configurado. Defina FRONTEND_BACKEND_BASE_URL con una URL pública HTTPS o same-origin.', 'error');
          return;
        }

        // Construir la URL del backend para la consulta API
        const targetUrl = backendBaseUrl.replace(/\/+$/, '') + '/api/owners?lastName=' + encodeURIComponent(lastName);

        // Si la página se carga sobre HTTPS y el backend es HTTP, advertir
        if (window.location.protocol === 'https:' && targetUrl.startsWith('http' + '://')) {
          setStatus('La página se sirve de forma segura por HTTPS, pero el backend configurado usa HTTP. Por favor, configure el backend con HTTPS.', 'error');
          return;
        }

        setStatus('Cargando propietarios...', 'loading');

        fetch(targetUrl)
          .then(response => {
            if (!response.ok) {
              throw new Error("HTTP " + response.status + " " + response.statusText);
            }
            return response.json();
          })
          .then(data => {
            if (!Array.isArray(data) || data.length === 0) {
              setStatus('No se encontraron propietarios.', 'info');
              containerEl.style.display = 'none';
              return;
            }

            statusEl.style.display = 'none';
            tableBodyEl.innerHTML = '';

            data.forEach(owner => {
              const tr = document.createElement('tr');

              // Name cell (link to detailed info)
              const nameTd = document.createElement('td');
              const link = document.createElement('a');
              // Link to /owners/{id} which is handled by the backend Thymeleaf template
              link.href = '/owners/' + owner.id;
              link.className = 'owner-link';
              link.textContent = (owner.firstName || '') + ' ' + (owner.lastName || '');
              nameTd.appendChild(link);
              tr.appendChild(nameTd);

              // Address cell
              const addressTd = document.createElement('td');
              addressTd.textContent = owner.address || '';
              tr.appendChild(addressTd);

              // City cell
              const cityTd = document.createElement('td');
              cityTd.textContent = owner.city || '';
              tr.appendChild(cityTd);

              // Telephone cell
              const telephoneTd = document.createElement('td');
              telephoneTd.textContent = owner.telephone || '';
              tr.appendChild(telephoneTd);

              // Pets cell
              const petsTd = document.createElement('td');
              if (Array.isArray(owner.pets) && owner.pets.length > 0) {
                owner.pets.forEach(pet => {
                  const badge = document.createElement('span');
                  badge.className = 'pet-badge';
                  badge.textContent = pet.name || '';
                  petsTd.appendChild(badge);
                });
              } else {
                petsTd.textContent = '-';
              }
              tr.appendChild(petsTd);

              tableBodyEl.appendChild(tr);
            });

            containerEl.style.display = 'block';
          })
          .catch(error => {
            setStatus('Error al obtener la lista de propietarios: ' + error.message, 'error');
            console.error('Error fetching owners:', error);
          });
      }());
    </script>
  </body>
</html>
