services:
  postgres:
    profiles: ["local-db"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: petclinic
      POSTGRES_USER: petclinic
      POSTGRES_PASSWORD: petclinic
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petclinic -d petclinic"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    image: spring-petclinic-devops-backend
    build:
      context: .
    restart: unless-stopped
    env_file:
      - path: ${PETCLINIC_ENV_FILE:-/home/azureuser/.spring-petclinic-devops-dev.env}
        required: false
    expose:
      - "8080"
    networks:
      default:
        aliases:
          - petclinic-backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    image: spring-petclinic-devops-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      FRONTEND_APP_ENV: ${FRONTEND_APP_ENV:-development}
      FRONTEND_BACKEND_BASE_URL: ${FRONTEND_BACKEND_BASE_URL:-same-origin}
      FRONTEND_GIT_SHA: ${GITHUB_SHA:-local}
    volumes:
      - ${FRONTEND_TLS_CERT_PATH:-./frontend/ssl/nginx.crt}:/etc/nginx/ssl/nginx.crt:ro
      - ${FRONTEND_TLS_KEY_PATH:-./frontend/ssl/nginx.key}:/etc/nginx/ssl/nginx.key:ro
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:443"
      - "443:443"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    depends_on:
      app:
        condition: service_healthy
    expose:
      - "9090"

  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/slo.json
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-guytho1996-petclinic.eastus2.cloudapp.azure.com}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://guytho1996-petclinic.eastus2.cloudapp.azure.com/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_COOKIE_SECURE: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    expose:
      - "3000"

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
