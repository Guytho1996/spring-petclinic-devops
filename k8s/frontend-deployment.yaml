apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic-frontend
  namespace: devops-lab
  labels:
    app: petclinic
    component: frontend
spec:
  replicas: 2
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 300
  minReadySeconds: 5
  selector:
    matchLabels:
      app: petclinic
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: petclinic
        component: frontend
        version: "IMAGE_TAG"
    spec:
      terminationGracePeriodSeconds: 15
      containers:
      - name: frontend
        image: ghcr.io/guytho1996/spring-petclinic-devops-frontend:IMAGE_TAG
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        - containerPort: 443
          name: https
        volumeMounts:
        - name: tls-certs
          mountPath: /etc/nginx/ssl
          readOnly: true
        resources:
          limits:
            cpu: "200m"
            memory: "128Mi"
          requests:
            cpu: "50m"
            memory: "64Mi"
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 5"]
        startupProbe:
          httpGet:
            path: /healthz
            port: 80
          periodSeconds: 5
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        env:
        - name: FRONTEND_GIT_SHA
          value: "IMAGE_TAG"
        envFrom:
        - configMapRef:
            name: petclinic-config
      volumes:
      - name: tls-certs
        secret:
          secretName: petclinic-frontend-tls
          items:
          - key: tls.crt
            path: nginx.crt
          - key: tls.key
            path: nginx.key
          defaultMode: 420
