apiVersion: v1
kind: Service
metadata:
  name: petclinic-backend
  namespace: devops-lab
  labels:
    app: petclinic
    component: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/actuator/prometheus"
    prometheus.io/port: "8080"
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: petclinic
    component: backend
