apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: devops-lab
  labels:
    app: prometheus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prometheus-discovery
  namespace: devops-lab
rules:
  - apiGroups: [""]
    resources: ["endpoints", "pods", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus-discovery
  namespace: devops-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: prometheus-discovery
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: devops-lab
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: devops-lab
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: petclinic-backend
        metrics_path: /actuator/prometheus
        scrape_interval: 5s
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - devops-lab
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: petclinic-backend
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: http
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - target_label: application
            replacement: spring-petclinic
          - target_label: service
            replacement: petclinic-backend
          - target_label: environment
            replacement: kubernetes

  petclinic-slo.yml: |
    groups:
      - name: petclinic-slo
        rules:
          - alert: PetclinicHttp5xxErrorRateHigh
            expr: |
              (
                sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
                /
                clamp_min(sum(rate(http_server_requests_seconds_count[5m])), 0.001)
              ) > 0.01
            for: 5m
            labels:
              severity: warning
              slo: availability
              service: petclinic-backend
            annotations:
              summary: "Petclinic HTTP 5xx error rate is above 1%"
              description: "HTTP 5xx responses have exceeded 1% of requests for 5 minutes."

          - alert: PetclinicErrorBudgetBurnFast
            expr: |
              (
                sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
                /
                clamp_min(sum(rate(http_server_requests_seconds_count[5m])), 0.001)
              ) / 0.001 > 10
            for: 5m
            labels:
              severity: critical
              slo: availability
              service: petclinic-backend
            annotations:
              summary: "Petclinic is burning error budget too quickly"
              description: "The 5-minute error budget burn rate is above 10x for the 99.9% availability SLO."

          - alert: PetclinicLatencyP99High
            expr: |
              histogram_quantile(
                0.99,
                sum(rate(http_server_requests_seconds_bucket[5m])) by (le)
              ) > 1
            for: 10m
            labels:
              severity: warning
              slo: latency
              service: petclinic-backend
            annotations:
              summary: "Petclinic P99 latency is above 1s"
              description: "P99 HTTP request latency has stayed above 1 second for 10 minutes."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: devops-lab
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
              name: http
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
            - name: prometheus-rules
              mountPath: /etc/prometheus/rules
              readOnly: true
            - name: prometheus-data
              mountPath: /prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
            items:
              - key: prometheus.yml
                path: prometheus.yml
        - name: prometheus-rules
          configMap:
            name: prometheus-config
            items:
              - key: petclinic-slo.yml
                path: petclinic-slo.yml
        - name: prometheus-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: devops-lab
  labels:
    app: prometheus
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: http
  selector:
    app: prometheus
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: devops-lab
  labels:
    app: grafana
data:
  datasource-prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true

  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: Petclinic SLO
        orgId: 1
        folder: Petclinic
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards

  slo.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"decimals": 3, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 99.9}, {"color": "green", "value": 99.95}]}, "unit": "percent"}, "overrides": []},
          "gridPos": {"h": 5, "w": 8, "x": 0, "y": 0},
          "id": 1,
          "options": {"colorMode": "background", "graphMode": "area", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}},
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "editorMode": "code", "expr": "100 * (1 - ((sum(increase(http_server_requests_seconds_count{status=~\"5..\"}[$__range])) or vector(0)) / clamp_min(sum(increase(http_server_requests_seconds_count[$__range])), 1)))", "instant": true, "range": false, "refId": "A"}],
          "title": "SLO Availability (99.9%)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"decimals": 1, "max": 100, "min": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 25}, {"color": "green", "value": 50}]}, "unit": "percent"}, "overrides": []},
          "gridPos": {"h": 5, "w": 8, "x": 8, "y": 0},
          "id": 2,
          "options": {"displayMode": "lcd", "orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}},
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "editorMode": "code", "expr": "clamp_min(100 * (1 - (((sum(increase(http_server_requests_seconds_count{status=~\"5..\"}[$__range])) or vector(0)) / clamp_min(sum(increase(http_server_requests_seconds_count[$__range])), 1)) / 0.001)), 0)", "instant": true, "range": false, "refId": "A"}],
          "title": "Error Budget Remaining",
          "type": "bargauge"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 1}, {"color": "green", "value": 2}]}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 5, "w": 8, "x": 16, "y": 0},
          "id": 3,
          "options": {"colorMode": "background", "graphMode": "area", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}},
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "editorMode": "code", "expr": "count(up{job=~\"petclinic.*\"} == 1)", "instant": true, "range": false, "refId": "A"}],
          "title": "Active Backend Pods / Targets",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"decimals": 2, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "unit": "reqps"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 5},
          "id": 4,
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "editorMode": "code", "expr": "sum(rate(http_server_requests_seconds_count[5m]))", "legendFormat": "requests/sec", "range": true, "refId": "A"}],
          "title": "Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"decimals": 2, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 0.5}, {"color": "red", "value": 1}]}, "unit": "percent"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 5},
          "id": 5,
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "editorMode": "code", "expr": "100 * ((sum(rate(http_server_requests_seconds_count{status=~\"5..\"}[5m])) or vector(0)) / clamp_min(sum(rate(http_server_requests_seconds_count[5m])), 0.001))", "legendFormat": "5xx %", "range": true, "refId": "A"}],
          "title": "HTTP 5xx Error Rate (Alert > 1% for 5m)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"decimals": 3, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 0.5}, {"color": "red", "value": 1}]}, "unit": "s"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 13},
          "id": 6,
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "editorMode": "code", "expr": "histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket[5m])) by (le))", "legendFormat": "P99", "range": true, "refId": "A"}],
          "title": "Latency P99",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"decimals": 2, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 5}, {"color": "red", "value": 10}]}, "unit": "none"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 13},
          "id": 7,
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "editorMode": "code", "expr": "((sum(rate(http_server_requests_seconds_count{status=~\"5..\"}[5m])) or vector(0)) / clamp_min(sum(rate(http_server_requests_seconds_count[5m])), 0.001)) / 0.001", "legendFormat": "burn rate vs 99.9% SLO", "range": true, "refId": "A"}],
          "title": "Error Budget Burn Rate",
          "type": "timeseries"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "tags": ["devops", "sre", "slo", "spring-boot", "prometheus"],
      "time": {"from": "now-1h", "to": "now"},
      "timezone": "browser",
      "title": "Spring Petclinic - SLO Dashboard",
      "uid": "spring-petclinic-slo",
      "version": 2
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: devops-lab
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.3.1
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: /var/lib/grafana/dashboards/slo.json
            - name: GF_SERVER_DOMAIN
              value: guytho1996-petclinic.eastus2.cloudapp.azure.com
            - name: GF_SERVER_ROOT_URL
              value: https://guytho1996-petclinic.eastus2.cloudapp.azure.com/grafana/
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            - name: GF_SECURITY_COOKIE_SECURE
              value: "true"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: grafana-datasource
              mountPath: /etc/grafana/provisioning/datasources/prometheus.yml
              subPath: datasource-prometheus.yml
              readOnly: true
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/petclinic.yml
              subPath: dashboards.yml
              readOnly: true
            - name: grafana-dashboard
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
      volumes:
        - name: grafana-datasource
          configMap:
            name: grafana-config
            items:
              - key: datasource-prometheus.yml
                path: datasource-prometheus.yml
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-config
            items:
              - key: dashboards.yml
                path: dashboards.yml
        - name: grafana-dashboard
          configMap:
            name: grafana-config
            items:
              - key: slo.json
                path: slo.json
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: devops-lab
  labels:
    app: grafana
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: grafana
